<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <style>
    .bg   { fill:#ffffff; }
    .th   { font-size:14px; font-weight:600; }
    .ts   { font-size:11px; fill:#475569; }
    .arr  { stroke:#64748b; stroke-width:1.5; fill:none; }
    .lbl  { fill:#ffffff; }
    .xlink{ stroke:#D85A30; stroke-width:1.5; fill:none; }
    .xtext{ fill:#9a3412; font-size:11px; }
    .c-purple rect{ fill:#f3e8ff; stroke:#9333ea; } .c-purple .th{ fill:#6b21a8; }
    .c-blue   rect{ fill:#e0f2fe; stroke:#0284c7; } .c-blue   .th{ fill:#075985; }
    .c-teal   rect{ fill:#ccfbf1; stroke:#0d9488; } .c-teal   .th{ fill:#115e59; }
    .c-amber  rect{ fill:#fef3c7; stroke:#d97706; } .c-amber  .th{ fill:#92400e; }
    .c-gray   rect{ fill:#f1f5f9; stroke:#64748b; } .c-gray   .th{ fill:#334155; }
  </style>
  <rect class="bg" x="0" y="0" width="960" height="620"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="ts" x="40" y="20">焦点问题：如何为一个问题选对数据结构？</text>

  <!-- ===== 层级连线 ===== -->
  <line class="arr" x1="450" y1="84"  x2="214" y2="123" marker-end="url(#arrow)"/>
  <line class="arr" x1="515" y1="84"  x2="766" y2="123" marker-end="url(#arrow)"/>
  <line class="arr" x1="225" y1="156" x2="352" y2="196" marker-end="url(#arrow)"/>
  <line class="arr" x1="190" y1="156" x2="126" y2="196" marker-end="url(#arrow)"/>
  <line class="arr" x1="750" y1="156" x2="706" y2="206" marker-end="url(#arrow)"/>
  <line class="arr" x1="792" y1="156" x2="852" y2="206" marker-end="url(#arrow)"/>
  <line class="arr" x1="778" y1="156" x2="800" y2="276" marker-end="url(#arrow)"/>

  <line class="arr" x1="358" y1="244" x2="113" y2="326" marker-end="url(#arrow)"/>
  <line class="arr" x1="360" y1="244" x2="270" y2="326" marker-end="url(#arrow)"/>
  <line class="arr" x1="362" y1="244" x2="430" y2="326" marker-end="url(#arrow)"/>
  <line class="arr" x1="365" y1="244" x2="585" y2="326" marker-end="url(#arrow)"/>
  <line class="arr" x1="366" y1="244" x2="730" y2="326" marker-end="url(#arrow)"/>

  <line class="arr" x1="110" y1="374" x2="110" y2="436" marker-end="url(#arrow)"/>
  <line class="arr" x1="270" y1="374" x2="270" y2="436" marker-end="url(#arrow)"/>
  <line class="arr" x1="430" y1="374" x2="430" y2="436" marker-end="url(#arrow)"/>
  <line class="arr" x1="585" y1="374" x2="585" y2="436" marker-end="url(#arrow)"/>
  <line class="arr" x1="730" y1="374" x2="730" y2="436" marker-end="url(#arrow)"/>

  <!-- ===== 交叉连接 ===== -->
  <path class="xlink" d="M800,324 V520 H585 V484" marker-end="url(#arrow)"/>
  <path class="xlink" d="M120,196 V100 H700 V206" marker-end="url(#arrow)"/>
  <path class="xlink" d="M800,324 L762,436" marker-end="url(#arrow)"/>
  <path class="xlink" d="M805,324 V540 H270 V484" marker-end="url(#arrow)"/>
  <path class="xlink" d="M855,254 H890 V575 H110 V484" marker-end="url(#arrow)"/>

  <!-- ===== 连接词标签 ===== -->
  <g><rect class="lbl" x="310" y="94"  width="40" height="16"/><text class="ts" x="330" y="102" text-anchor="middle" dominant-baseline="central">先界定</text></g>
  <g><rect class="lbl" x="625" y="94"  width="40" height="16"/><text class="ts" x="645" y="102" text-anchor="middle" dominant-baseline="central">再衡量</text></g>
  <g><rect class="lbl" x="286" y="170" width="28" height="16"/><text class="ts" x="300" y="178" text-anchor="middle" dominant-baseline="central">首看</text></g>
  <g><rect class="lbl" x="136" y="170" width="28" height="16"/><text class="ts" x="150" y="178" text-anchor="middle" dominant-baseline="central">并估</text></g>
  <g><rect class="lbl" x="708" y="174" width="28" height="16"/><text class="ts" x="722" y="182" text-anchor="middle" dominant-baseline="central">主看</text></g>
  <g><rect class="lbl" x="814" y="174" width="28" height="16"/><text class="ts" x="828" y="182" text-anchor="middle" dominant-baseline="central">兼顾</text></g>
  <g><rect class="lbl" x="788" y="217" width="40" height="16"/><text class="ts" x="808" y="225" text-anchor="middle" dominant-baseline="central">易忽视</text></g>

  <g><rect class="lbl" x="100" y="302" width="40" height="16"/><text class="ts" x="120" y="310" text-anchor="middle" dominant-baseline="central">查单条</text></g>
  <g><rect class="lbl" x="252" y="302" width="40" height="16"/><text class="ts" x="272" y="310" text-anchor="middle" dominant-baseline="central">扫区间</text></g>
  <g><rect class="lbl" x="410" y="302" width="40" height="16"/><text class="ts" x="430" y="310" text-anchor="middle" dominant-baseline="central">取极值</text></g>
  <g><rect class="lbl" x="565" y="302" width="40" height="16"/><text class="ts" x="585" y="310" text-anchor="middle" dominant-baseline="central">随机读</text></g>
  <g><rect class="lbl" x="708" y="302" width="40" height="16"/><text class="ts" x="728" y="310" text-anchor="middle" dominant-baseline="central">改两端</text></g>

  <g><rect class="lbl" x="84"  y="397" width="52" height="16"/><text class="ts" x="110" y="405" text-anchor="middle" dominant-baseline="central">等值匹配</text></g>
  <g><rect class="lbl" x="250" y="397" width="40" height="16"/><text class="ts" x="270" y="405" text-anchor="middle" dominant-baseline="central">要有序</text></g>
  <g><rect class="lbl" x="410" y="397" width="40" height="16"/><text class="ts" x="430" y="405" text-anchor="middle" dominant-baseline="central">取堆顶</text></g>
  <g><rect class="lbl" x="565" y="397" width="40" height="16"/><text class="ts" x="585" y="405" text-anchor="middle" dominant-baseline="central">靠下标</text></g>
  <g><rect class="lbl" x="710" y="397" width="40" height="16"/><text class="ts" x="730" y="405" text-anchor="middle" dominant-baseline="central">改指针</text></g>

  <!-- 交叉连接文字 -->
  <g><rect class="lbl" x="588" y="504" width="124" height="16"/><text class="xtext" x="650" y="512" text-anchor="middle" dominant-baseline="central">连续内存让它快过链表</text></g>
  <g><rect class="lbl" x="320" y="85"  width="122" height="16"/><text class="xtext" x="381" y="93"  text-anchor="middle" dominant-baseline="central">n 越大，复杂度阶越主导</text></g>
  <g><rect class="lbl" x="806" y="384" width="98"  height="16"/><text class="xtext" x="855" y="392" text-anchor="middle" dominant-baseline="central">跳指针破坏局部性</text></g>
  <g><rect class="lbl" x="426" y="532" width="88"  height="16"/><text class="xtext" x="470" y="540" text-anchor="middle" dominant-baseline="central">树节点散布慢</text></g>
  <g><rect class="lbl" x="438" y="567" width="92"  height="16"/><text class="xtext" x="484" y="575" text-anchor="middle" dominant-baseline="central">以空间换 O(1)</text></g>

  <!-- ===== 节点 ===== -->
  <g class="node c-purple">
    <rect x="400" y="36" width="160" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="480" y="52" text-anchor="middle" dominant-baseline="central">选对数据结构</text>
    <text class="ts" x="480" y="71" text-anchor="middle" dominant-baseline="central">在需求与代价间权衡</text>
  </g>

  <g class="node c-blue">
    <rect x="150" y="123" width="120" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="210" y="140" text-anchor="middle" dominant-baseline="central">需求分析</text>
  </g>
  <g class="node c-amber">
    <rect x="710" y="123" width="120" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="770" y="140" text-anchor="middle" dominant-baseline="central">代价度量</text>
  </g>

  <g class="node c-blue">
    <rect x="295" y="196" width="130" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="360" y="212" text-anchor="middle" dominant-baseline="central">高频操作</text>
    <text class="ts" x="360" y="231" text-anchor="middle" dominant-baseline="central">最常执行的操作</text>
  </g>
  <g class="node c-blue">
    <rect x="60" y="196" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="120" y="212" text-anchor="middle" dominant-baseline="central">数据规模 n</text>
    <text class="ts" x="120" y="231" text-anchor="middle" dominant-baseline="central">数据量级</text>
  </g>
  <g class="node c-amber">
    <rect x="640" y="206" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="700" y="222" text-anchor="middle" dominant-baseline="central">时间复杂度</text>
    <text class="ts" x="700" y="241" text-anchor="middle" dominant-baseline="central">随 n 增长的阶</text>
  </g>
  <g class="node c-amber">
    <rect x="800" y="206" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="855" y="222" text-anchor="middle" dominant-baseline="central">空间复杂度</text>
    <text class="ts" x="855" y="241" text-anchor="middle" dominant-baseline="central">额外内存开销</text>
  </g>
  <g class="node c-amber">
    <rect x="735" y="276" width="130" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="800" y="292" text-anchor="middle" dominant-baseline="central">缓存局部性</text>
    <text class="ts" x="800" y="311" text-anchor="middle" dominant-baseline="central">连续内存更快</text>
  </g>

  <g class="node c-gray">
    <rect x="50" y="326" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="342" text-anchor="middle" dominant-baseline="central">按键查找</text>
    <text class="ts" x="110" y="361" text-anchor="middle" dominant-baseline="central">定位单条记录</text>
  </g>
  <g class="node c-gray">
    <rect x="210" y="326" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="342" text-anchor="middle" dominant-baseline="central">范围查询</text>
    <text class="ts" x="270" y="361" text-anchor="middle" dominant-baseline="central">区间或排序遍历</text>
  </g>
  <g class="node c-gray">
    <rect x="375" y="326" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="342" text-anchor="middle" dominant-baseline="central">取最值</text>
    <text class="ts" x="430" y="361" text-anchor="middle" dominant-baseline="central">反复取单端极值</text>
  </g>
  <g class="node c-gray">
    <rect x="525" y="326" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="585" y="342" text-anchor="middle" dominant-baseline="central">随机访问</text>
    <text class="ts" x="585" y="361" text-anchor="middle" dominant-baseline="central">按下标读取</text>
  </g>
  <g class="node c-gray">
    <rect x="670" y="326" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="730" y="342" text-anchor="middle" dominant-baseline="central">两端增删</text>
    <text class="ts" x="730" y="361" text-anchor="middle" dominant-baseline="central">头尾频繁插删</text>
  </g>

  <g class="node c-teal">
    <rect x="50" y="436" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="452" text-anchor="middle" dominant-baseline="central">哈希表</text>
    <text class="ts" x="110" y="471" text-anchor="middle" dominant-baseline="central">均摊 O(1)·无序</text>
  </g>
  <g class="node c-teal">
    <rect x="205" y="436" width="130" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="452" text-anchor="middle" dominant-baseline="central">平衡 BST</text>
    <text class="ts" x="270" y="471" text-anchor="middle" dominant-baseline="central">O(log n)·有序</text>
  </g>
  <g class="node c-teal">
    <rect x="375" y="436" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="452" text-anchor="middle" dominant-baseline="central">堆</text>
    <text class="ts" x="430" y="471" text-anchor="middle" dominant-baseline="central">O(log n) 取极值</text>
  </g>
  <g class="node c-teal">
    <rect x="520" y="436" width="130" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="585" y="452" text-anchor="middle" dominant-baseline="central">动态数组</text>
    <text class="ts" x="585" y="471" text-anchor="middle" dominant-baseline="central">下标 O(1)·内存连续</text>
  </g>
  <g class="node c-teal">
    <rect x="670" y="436" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="730" y="452" text-anchor="middle" dominant-baseline="central">链表</text>
    <text class="ts" x="730" y="471" text-anchor="middle" dominant-baseline="central">O(1)增删·先定位</text>
  </g>
</svg>
