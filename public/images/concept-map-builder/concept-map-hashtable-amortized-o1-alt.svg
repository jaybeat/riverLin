<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 575" width="880" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif">
  <style>
    .bg   { fill:#ffffff; }
    .th   { font-size:14px; font-weight:600; }
    .ts   { font-size:10.5px; fill:#475569; }
    .arr  { stroke:#64748b; stroke-width:1.5; fill:none; }
    .lbl  { fill:#ffffff; }
    .cl   { font-size:11px; fill:#334155; }
    .xlink{ stroke:#D85A30; stroke-width:1.6; fill:none; }
    .xtext{ fill:#9a3412; font-size:11px; font-weight:600; }
    .c-purple rect{ fill:#f3e8ff; stroke:#9333ea; } .c-purple .th{ fill:#6b21a8; }
    .c-blue   rect{ fill:#e0f2fe; stroke:#0284c7; } .c-blue   .th{ fill:#075985; }
    .c-teal   rect{ fill:#ccfbf1; stroke:#0d9488; } .c-teal   .th{ fill:#115e59; }
    .c-amber  rect{ fill:#fef3c7; stroke:#d97706; } .c-amber  .th{ fill:#92400e; }
    .c-rose   rect{ fill:#ffe4e6; stroke:#e11d48; } .c-rose   .th{ fill:#9f1239; }
    .c-green  rect{ fill:#dcfce7; stroke:#16a34a; } .c-green  .th{ fill:#166534; }
    .c-gray   rect{ fill:#f1f5f9; stroke:#64748b; } .c-gray   .th{ fill:#334155; }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="575"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 焦点问题 -->
  <text class="ts" x="30" y="22" style="font-size:12.5px;font-weight:600;fill:#1e293b">焦点问题：哈希表凭什么做到均摊 O(1)？</text>

  <!-- ===================== 层级连线（灰，箭头一律向下/横向） ===================== -->
  <path class="arr" d="M410 84 L246 120" marker-end="url(#arrow)"/>
  <path class="arr" d="M452 84 L405 120" marker-end="url(#arrow)"/>
  <path class="arr" d="M490 66 L636 121" marker-end="url(#arrow)"/>
  <path class="arr" d="M240 172 L240 215" marker-end="url(#arrow)"/>
  <path class="arr" d="M312 152 L366 216" marker-end="url(#arrow)"/>
  <path class="arr" d="M172 248 L137 254" marker-end="url(#arrow)"/>
  <path class="arr" d="M232 266 L228 311" marker-end="url(#arrow)"/>
  <path class="arr" d="M392 266 L292 314" marker-end="url(#arrow)"/>
  <path class="arr" d="M340 337 L297 337" marker-end="url(#arrow)"/>
  <path class="arr" d="M232 363 L286 408" marker-end="url(#arrow)"/>
  <path class="arr" d="M200 363 L143 408" marker-end="url(#arrow)"/>
  <path class="arr" d="M345 172 H320 V407" marker-end="url(#arrow)"/>
  <path class="arr" d="M338 460 L398 474" marker-end="url(#arrow)"/>
  <path class="arr" d="M72 280 L72 314" marker-end="url(#arrow)"/>
  <path class="arr" d="M690 172 L690 239" marker-end="url(#arrow)"/>
  <path class="arr" d="M690 292 L690 359" marker-end="url(#arrow)"/>
  <path class="arr" d="M684 412 L556 477" marker-end="url(#arrow)"/>

  <!-- ===================== 交叉连接（珊瑚色，α↔扩容 反馈闭环，标签左移避让节点） ===================== -->
  <path class="xlink" d="M480 325 H545 V146 H600" marker-end="url(#arrow)"/>
  <path class="xlink" d="M600 266 H560 V348 H480" marker-end="url(#arrow)"/>

  <!-- ===================== 连接词标签（灰） ===================== -->
  <g text-anchor="middle">
    <rect class="lbl" x="319" y="91"  width="18" height="15"/><text class="cl" x="328" y="102">用</text>
    <rect class="lbl" x="407" y="91"  width="41" height="15"/><text class="cl" x="428" y="102">底层是</text>
    <rect class="lbl" x="530" y="83"  width="63" height="15"/><text class="cl" x="562" y="94">元素多触发</text>
    <rect class="lbl" x="204" y="185" width="72" height="15"/><text class="cl" x="240" y="196">多键映射同槽</text>
    <rect class="lbl" x="321" y="176" width="52" height="15"/><text class="cl" x="347" y="187">理想满足</text>
    <rect class="lbl" x="124" y="236" width="52" height="15"/><text class="cl" x="150" y="247">靠它化解</text>
    <rect class="lbl" x="209" y="279" width="41" height="15"/><text class="cl" x="230" y="290">累积成</text>
    <rect class="lbl" x="321" y="278" width="63" height="15"/><text class="cl" x="353" y="289">均分到各槽</text>
    <rect class="lbl" x="305" y="321" width="30" height="15"/><text class="cl" x="320" y="332">决定</text>
    <rect class="lbl" x="241" y="377" width="30" height="15"/><text class="cl" x="256" y="388">短则</text>
    <rect class="lbl" x="134" y="377" width="52" height="15"/><text class="cl" x="160" y="388">全碰撞则</text>
    <rect class="lbl" x="291" y="239" width="58" height="15"/><text class="cl" x="320" y="250">O(1)寻址</text>
    <rect class="lbl" x="326" y="457" width="52" height="15"/><text class="cl" x="352" y="468">叠加摊销</text>
    <rect class="lbl" x="63"  y="289" width="18" height="15"/><text class="cl" x="72"  y="300">如</text>
    <rect class="lbl" x="675" y="195" width="30" height="15"/><text class="cl" x="690" y="206">采用</text>
    <rect class="lbl" x="669" y="315" width="41" height="15"/><text class="cl" x="690" y="326">摊平为</text>
    <rect class="lbl" x="590" y="437" width="52" height="15"/><text class="cl" x="616" y="448">摊到每次</text>
  </g>

  <!-- ===================== 交叉连接标签（珊瑚色，错开） ===================== -->
  <g text-anchor="middle">
    <rect class="lbl" x="513" y="224" width="64" height="15"/><text class="xtext" x="545" y="235">超阈值触发</text>
    <rect class="lbl" x="530" y="301" width="64" height="15"/><text class="xtext" x="562" y="312">扩容压回α</text>
  </g>

  <!-- ===================== 节点 ===================== -->
  <!-- 目标 -->
  <g class="node c-purple">
    <rect x="370" y="36" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="52" text-anchor="middle" dominant-baseline="central">哈希表</text>
    <text class="ts" x="430" y="70" text-anchor="middle" dominant-baseline="central">键值存储</text>
  </g>

  <!-- 左支：单次操作期望 O(1) -->
  <g class="node c-blue">
    <rect x="165" y="120" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="137" text-anchor="middle" dominant-baseline="central">哈希函数</text>
    <text class="ts" x="240" y="156" text-anchor="middle" dominant-baseline="central">键→下标，如 k mod m</text>
  </g>
  <g class="node c-blue">
    <rect x="335" y="120" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="410" y="137" text-anchor="middle" dominant-baseline="central">数组随机访问</text>
    <text class="ts" x="410" y="156" text-anchor="middle" dominant-baseline="central">按哈希下标 O(1) 取值</text>
  </g>
  <g class="node c-blue">
    <rect x="170" y="216" width="140" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="233" text-anchor="middle" dominant-baseline="central">冲突</text>
    <text class="ts" x="240" y="251" text-anchor="middle" dominant-baseline="central">查找须逐个比对</text>
  </g>
  <g class="node c-blue">
    <rect x="335" y="216" width="150" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="410" y="233" text-anchor="middle" dominant-baseline="central">散列均匀(SUHA)</text>
    <text class="ts" x="410" y="251" text-anchor="middle" dominant-baseline="central">键近似均匀分散</text>
  </g>
  <g class="node c-gray">
    <rect x="10" y="230" width="125" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="72" y="247" text-anchor="middle" dominant-baseline="central">链地址/开放寻址</text>
    <text class="ts" x="72" y="265" text-anchor="middle" dominant-baseline="central">化解冲突的方法</text>
  </g>
  <g class="node c-blue">
    <rect x="155" y="311" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="225" y="329" text-anchor="middle" dominant-baseline="central">平均链长</text>
    <text class="ts" x="225" y="348" text-anchor="middle" dominant-baseline="central">≈α · 待查元素数</text>
  </g>
  <g class="node c-blue">
    <rect x="340" y="311" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="410" y="329" text-anchor="middle" dominant-baseline="central">装载因子 α</text>
    <text class="ts" x="410" y="348" text-anchor="middle" dominant-baseline="central">元素数÷桶数（枢纽）</text>
  </g>
  <g class="node c-green">
    <rect x="10" y="315" width="135" height="42" rx="8" stroke-width="0.5"/>
    <text class="th" x="77" y="336" text-anchor="middle" dominant-baseline="central" style="font-size:11.5px">Java HashMap · Py dict</text>
  </g>
  <g class="node c-rose">
    <rect x="60" y="408" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="426" text-anchor="middle" dominant-baseline="central">最坏 O(n)</text>
    <text class="ts" x="130" y="445" text-anchor="middle" dominant-baseline="central">如 HashDoS 攻击</text>
  </g>
  <g class="node c-amber">
    <rect x="225" y="408" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="426" text-anchor="middle" dominant-baseline="central">期望 O(1)</text>
    <text class="ts" x="300" y="445" text-anchor="middle" dominant-baseline="central">对哈希随机性取平均</text>
  </g>

  <!-- 右支：扩容代价被摊平 -->
  <g class="node c-teal">
    <rect x="600" y="120" width="180" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="690" y="138" text-anchor="middle" dominant-baseline="central">动态扩容 (rehash)</text>
    <text class="ts" x="690" y="157" text-anchor="middle" dominant-baseline="central">单次 O(n)·重排全部元素</text>
  </g>
  <g class="node c-teal">
    <rect x="600" y="240" width="180" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="690" y="258" text-anchor="middle" dominant-baseline="central">倍增扩容</text>
    <text class="ts" x="690" y="277" text-anchor="middle" dominant-baseline="central">×2·如 α&gt;0.75 翻倍</text>
  </g>
  <g class="node c-teal">
    <rect x="600" y="360" width="180" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="690" y="378" text-anchor="middle" dominant-baseline="central">均摊分析</text>
    <text class="ts" x="690" y="397" text-anchor="middle" dominant-baseline="central">总代价 ÷ 次数 → O(1)</text>
  </g>

  <!-- 答案（汇聚） -->
  <g class="node c-amber">
    <rect x="350" y="474" width="200" height="56" rx="8" stroke-width="1.4"/>
    <text class="th" x="450" y="493" text-anchor="middle" dominant-baseline="central" style="font-size:15px">均摊 O(1)</text>
    <text class="ts" x="450" y="513" text-anchor="middle" dominant-baseline="central">对操作序列取平均</text>
  </g>
</svg>
